[profile.default]
src = "src"
out = "out"
libs = ["lib"]
ffi = true
remappings = [
    "@battlechain-contracts/=lib/battlechain-safe-harbor-contracts/src/",
]

fs_permissions = [
    { access = "read", path = "./broadcast" },
    { access = "read", path = "." },
]

[fmt]
bracket_spacing = true
int_types = "long"
line_length = 120
multiline_func_header = "all"
number_underscore = "thousands"
quote_style = "double"
tab_width = 4
wrap_comments = true

[lint]
exclude_lints = ["mixed-case-variable"]
# AgreementTypes.sol is a pure re-export of the contracts' types; the aliased re-exports trip
# the unused-import lint even though downstream files consume them.
ignore = ["test/**/*", "src/types/AgreementTypes.sol"]
