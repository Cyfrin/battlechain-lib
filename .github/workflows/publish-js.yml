name: Publish JS to npm

on:
  push:
    tags:
      - "js-v*"

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: packages/battlechain-lib-js
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0 # zizmor: ignore[cache-poisoning] caching not enabled (no cache input set)
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      # OIDC trusted publishing needs npm >= 11.5.1; Node 22 ships npm 10.x.
      - run: npm install -g npm@latest

      - run: npm ci

      - run: npm run build

      - run: npm pkg set version="${GITHUB_REF_NAME#js-v}"

      - run: npm publish --access public
